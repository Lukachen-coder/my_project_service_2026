<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>зҷ»еҪ•жөӢиҜ•</title>
</head>
<body>
    <h1>зҷ»еҪ•жөӢиҜ•</h1>
    <form id="loginForm">
        <div>
            <label for="username">з”ЁжҲ·еҗҚ:</label>
            <input type="text" id="username" name="username" value="admin">
        </div>
        <div>
            <label for="password">еҜҶз Ғ:</label>
            <input type="password" id="password" name="password" value="admin123">
        </div>
        <button type="submit">зҷ»еҪ•</button>
    </form>
    <div id="result"></div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const resultDiv = document.getElementById('result');
            
            resultDiv.textContent = 'зҷ»еҪ•дёӯ...';
            
            fetch('http://localhost:8001/api/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            })
            .then(response => response.json())
            .then(data => {
                resultDiv.textContent = JSON.stringify(data, null, 2);
                console.log('зҷ»еҪ•е“Қеә”:', data);
            })
            .catch(error => {
                resultDiv.textContent = 'й”ҷиҜҜ: ' + error.message;
                console.error('й”ҷиҜҜ:', error);
            });
        });
    </script>
</body>
</html>
